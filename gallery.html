<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Ziyun Zhao</title>
    <meta name="description" content="A gallery of photos taken by Ziyun Zhao.">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="robots" content="all">

    <link rel="stylesheet" type="text/css" media="all" href="assets/stylesheets/main_free.css" />
    <link rel="stylesheet" type="text/css" media="all" href="clarity/clarity.css" />
    <link rel="stylesheet" type="text/css" media="all" href="assets/stylesheets/custom.css" />
    <link href="assets/fontawesome-free-7.2.0-web/css/all.min.css" rel="stylesheet">
</head>

<body>
    <!-- ============================= Top navigation ============================= -->
    <nav class="site-nav">
        <a class="brand" href="index.html">Ziyun Zhao</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="index.html#blog">Blog</a>
            <a href="gallery.html" class="active">Gallery</a>
        </div>
    </nav>

    <!-- ============================= Header ============================= -->
    <div class="container blog" id="first-content" style="background-color: #E0E4E6;">
        <div class="blog-title no-cover">
            <div class="blog-intro">
                <div>
                    <h1 class="title">Gallery</h1>
                    <p class="author post-meta">A few photos I've taken. Click any image to enlarge.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ============================= Photo grid ============================= -->
    <div class="container">
        <div class="gallery">
            <!--
              To add a photo:
              1. Drop the image file into the gallery/ folder (e.g. gallery/sunset.jpg).
              2. Copy one <figure> block below and update the src and the caption.
              Tip: images can be any size/shape — the grid arranges them automatically.
            -->
            <figure>
                <img src="gallery/photo-01.svg" alt="Photo 1">
                <figcaption>Replace with your caption</figcaption>
            </figure>
            <figure>
                <img src="gallery/photo-02.svg" alt="Photo 2">
                <figcaption>Replace with your caption</figcaption>
            </figure>
            <figure>
                <img src="gallery/photo-03.svg" alt="Photo 3">
                <figcaption>Replace with your caption</figcaption>
            </figure>
            <figure>
                <img src="gallery/photo-04.svg" alt="Photo 4">
                <figcaption>Replace with your caption</figcaption>
            </figure>
            <figure>
                <img src="gallery/photo-05.svg" alt="Photo 5">
                <figcaption>Replace with your caption</figcaption>
            </figure>
            <figure>
                <img src="gallery/photo-06.svg" alt="Photo 6">
                <figcaption>Replace with your caption</figcaption>
            </figure>
        </div>
    </div>

    <!-- ============================= Lightbox overlay ============================= -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img src="" alt="" id="lightbox-img">
    </div>

    <!-- ============================= Footer ============================= -->
    <footer>
        <div class="container">
            <p>
                © 2026 Ziyun Zhao. This website is built on the
                <a href="https://shikun.io/projects/clarity">Clarity Template</a>.
            </p>
        </div>
    </footer>

    <script>
        (function () {
            var lightbox = document.getElementById('lightbox');
            var lightboxImg = document.getElementById('lightbox-img');
            var closeBtn = document.getElementById('lightbox-close');

            document.querySelectorAll('.gallery figure img').forEach(function (img) {
                img.addEventListener('click', function () {
                    lightboxImg.src = img.getAttribute('src');
                    lightboxImg.alt = img.getAttribute('alt') || '';
                    lightbox.classList.add('open');
                });
            });

            function closeLightbox() {
                lightbox.classList.remove('open');
                lightboxImg.src = '';
            }
            lightbox.addEventListener('click', closeLightbox);
            closeBtn.addEventListener('click', closeLightbox);
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Escape') closeLightbox();
            });
        })();
    </script>
</body>
</html>
